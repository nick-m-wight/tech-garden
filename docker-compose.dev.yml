# Development — backend + nginx proxy.
# Backend source mounted so changes are visible without image rebuild;
# run `docker compose exec backend npm run build` to recompile TypeScript.
# OWASP A05 — backend runs as non-root user.
services:
  backend:
    build:
      context: .
      dockerfile: packages/garden/backend/Dockerfile
      target: development
    ports:
      - "3001:3000"
      - "7010:7010"
    env_file: .env.dev
    volumes:
      - ./packages/garden/backend/src:/app/packages/garden/backend/src
      - ./packages/base/backend/src:/app/packages/base/backend/src
      - ./data/dev:/app/packages/garden/backend/data
      - ./keys:/app/packages/garden/backend/keys:ro
    user: "node"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
