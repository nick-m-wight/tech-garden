# Production — backend binds to 127.0.0.1 only; nginx on loopback.
# External access is handled by a tunnel layer in front of nginx.
# See infra/remote-access/OPTIONS.md for tunnel options.
# OWASP A05 — both services run as non-root.
services:
  backend:
    build:
      context: .
      dockerfile: packages/garden/backend/Dockerfile
      target: production
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env.prod
    volumes:
      - ./data/prod:/app/packages/garden/backend/data
      - ./logs:/app/packages/garden/backend/logs
    restart: unless-stopped
    user: "node"

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - backend
